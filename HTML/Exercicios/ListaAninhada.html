<h1>Projeto</h1>
<ul class = "tree">
    <li>
        <span teste>backend</span>
        <ul>
            <li>
                <span teste>app</span>
                <ul>
                    <li>produto.js</li>
                    <li>usuario.js</li>
                    <li>vendas.js</li>
                </ul>
            </li>
            <li>
                <span teste>config</span>
                <ul>
                    <li>banco.js</li>
                    <li>rotas.js</li>
                    <li>servidor.js</li>
                </ul>
            </li>
        </ul>
    </li>
    <li>
        <span teste>frontend</span>
        <ul>
            <li>
            <span teste>public</span> 
                <ul>
                    <li>app.css</li>
                    <li>app.js</li>
                    <li>index.js</li>
                </ul>
            </li>
        </ul>
    </li>
</ul>
<link rel="stylesheet" href="http://files.cod3r.com.br/curso-web/tree.css">
<script>
    document.querySelectorAll('[teste]').forEach(pasta => {
        pasta.onclick = function (evento) {
            const proximoElemento = pasta.nextElementSibling;
            const displayDaListaDesordenada = proximoElemento.style.display;
            proximoElemento.style.display = displayDaListaDesordenada === 'none' ? 'block' : 'none'; 
        }
    })
</script>
