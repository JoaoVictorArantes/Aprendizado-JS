<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios de HTML</title>
    <style>
        #Conteudo {
            padding: 30px 0px;
        }
    </style>
</head>
<body>
    <header>
        Exercícios de HTML
    </header>
    <nav>
        <a href Custom="Exercicios/teste.html">00 - Teste.</a> | <!-- Alterar apenas essa parte conforme a pasta Exercicios/-->
        <a href Custom="Exercicios/01-texto.html">01 - Texto.</a> |
        <a href Custom="Exercicios/02-texto2.html">01 - Texto 2.</a> |
        <a href Custom="Exercicios/listas.html">02 - Listas.</a> |
        <a href Custom="Exercicios/ListaAninhada.html">02 - Listas Aninhadas .</a> |
        <a href Custom="Exercicios/Links.html">03 - Links .</a> |
        <a href Custom="Exercicios/tabelas.html">04 - Tabelas.</a> |
        <a href Custom="Exercicios/form/form.html">05 - Formulário.</a> |

    </nav>
    <section id="Conteudo"></section>
    <footer>
        Tentando fazer o curso de Web Moderno, na Udemy.
    </footer>
    <script>
        document.querySelectorAll('[Custom]').forEach(link => {
            link.onclick = function (evento){
                evento.preventDefault();

                const conteudo = document.getElementById('Conteudo')

                fetch(link.getAttribute('Custom'))
                    .then(resposta => resposta.text())
                    .then(html => conteudo.innerHTML = html)
            }
        })
    </script>
</body>
</html>
