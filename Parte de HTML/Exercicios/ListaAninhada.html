<h1>Projeto</h1>
<ul class = "tree">
    <li>
        <span mostraESome>backend</span>
        <ul>
            <li>
                <span mostraESome>app</span>
                <ul>
                    <li>produto.js</li>
                    <li>usuario.js</li>
                    <li>vendas.js</li>
                </ul>
            </li>
            <li>
                <span mostraESome>config</span>
                <ul>
                    <li>banco.js</li>
                    <li>rotas.js</li>
                    <li>servidor.js</li>
                </ul>
            </li>
        </ul>
    </li>
    <li>
        <span mostraESome>frontend</span>
        <ul>
            <li>
            <span mostraESome>public</span>
                <ul>
                    <li>app.css</li>
                    <li>app.js</li>
                    <li>index.js</li>
                </ul>
            </li>
        </ul>
    </li>
</ul>
<script>
    document.querySelectorAll('[mostraESome]').forEach(pasta => {
        // 1. Corrigido para onclick (minúsculo)
        pasta.onclick = function(evento) {
            const proximoElemento = pasta.nextElementSibling;
            
            if (proximoElemento) {
                // 2. Verificação mais robusta para o display
                const displayAtual = window.getComputedStyle(proximoElemento).display;
                proximoElemento.style.display = displayAtual === 'none' ? 'block' : 'none';
            }
        };
    });
</script>
